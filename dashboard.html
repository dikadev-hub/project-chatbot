<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dika Dev Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #E2E2E2;
            --accent-color: #FFDE00;
            --border-color: #000000;
            --skin: #FFDBAC;
            --hair-dika: #5D3A1A;
            --hair-dinda: #FF71CD;
            --shirt-dika: #00A896;
            --shirt-dinda: #FF4E88;
            --pants: #333;
        }

        body {
            font-family: 'Public Sans', sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 0; overflow: hidden; 
            height: 100vh; color: #000; display: flex; flex-direction: column;
        }

        .neo-border { border: 3px solid #000; box-shadow: 5px 5px 0px 0px #000; }

        /* NEOBRUTALISM CHARACTER - FULL KOTAK */
        .mc-char {
            width: 36px; height: 80px;
            position: fixed;
            z-index: 100;
            pointer-events: none;
            transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .mc-head {
            width: 26px; height: 26px; background: var(--skin);
            border: 3px solid black; position: absolute; top: 0; left: 5px;
            box-shadow: inset 2px 2px 0px rgba(0,0,0,0.3);
        }
        .mc-hair { 
            width: 100%; height: 7px; border-bottom: 2px solid black;
            position: absolute; top: 0; left: 0; box-shadow: inset 1px 1px 0px rgba(0,0,0,0.2);
        }
        .eye-row { 
            display: flex; justify-content: space-between; padding: 5px 3px 0; 
            position: absolute; top: 8px; left: 0; right: 0;
        }
        .mc-eye { 
            width: 4px; height: 3px; background: white; border: 2px solid black; 
            position: relative; box-shadow: inset 1px 1px 0px rgba(0,0,0,0.2);
        }
        .mc-eye::after { 
            content: ''; position: absolute; width: 1.5px; height: 1.5px; 
            background: #333; right: 0; bottom: 0; box-shadow: 0.5px 0.5px 0px white;
        }
        .mc-body { 
            width: 26px; height: 28px; border: 3px solid black; 
            position: absolute; top: 24px; left: 5px;
            box-shadow: inset 2px 2px 0px rgba(0,0,0,0.3);
        }
        .mc-arm { 
            width: 8px; height: 24px; background: var(--skin); 
            border: 3px solid black; position: absolute; top: 26px; 
            transform-origin: top center; transition: all 0.6s;
            box-shadow: inset 1px 1px 0px rgba(0,0,0,0.2);
        }
        .mc-leg { 
            width: 10px; height: 27px; background: var(--pants); 
            border: 3px solid black; position: absolute; top: 51px; 
            transform-origin: top center; box-shadow: inset 1px 1px 0px rgba(0,0,0,0.2);
        }
        
        .dika .mc-hair { background: var(--hair-dika); }
        .dika .mc-body { background: var(--shirt-dika); }
        .dinda .mc-hair { background: var(--hair-dinda); }
        .dinda .mc-body { background: var(--shirt-dinda); }

        /* Animations */
        @keyframes walk { 0%, 100% { transform: rotate(-25deg); } 50% { transform: rotate(25deg); } }
        @keyframes walk-alt { 0%, 100% { transform: rotate(25deg); } 50% { transform: rotate(-25deg); } }
        .walking-l { animation: walk 0.45s infinite; }
        .walking-r { animation: walk-alt 0.45s infinite; }
        @keyframes sitSwing { 0%, 100% { transform: rotate(30deg); } 50% { transform: rotate(60deg); } }
        .sit-swing-l { animation: sitSwing 1.2s infinite ease-in-out; }
        .sit-swing-r { animation: sitSwing 1.2s infinite ease-in-out 0.3s; }
        @keyframes headShake { 0%, 100% { transform: translateX(0) rotate(0deg); } 25% { transform: translateX(-2px) rotate(-3deg); } 75% { transform: translateX(2px) rotate(3deg); } }
        @keyframes armWave { 0%, 100% { transform: rotate(-15deg); } 50% { transform: rotate(40deg); } }
        @keyframes sadBounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }

        .head-shake { animation: headShake 0.7s ease-in-out; }
        .arm-wave { animation: armWave 1.2s infinite; }
        .sad-bounce { animation: sadBounce 0.6s infinite; }

        /* NEOBRUTALISM SPEECH BUBBLE - FIXED POSITION */
        .bubble {
            position: absolute; background: white; border: 3px solid black;
            padding: 6px 12px; font-size: 9px; font-weight: 900; text-transform: uppercase;
            top: -65px; /* DINAICKAN LAGI */
            left: 50%; transform: translateX(-50%);
            display: none; white-space: nowrap; z-index: 110;
            box-shadow: 6px 6px 0px black; font-family: 'Public Sans', sans-serif;
            letter-spacing: 0.5px; line-height: 1.1;
            max-width: 120px; /* BATASI PANJANG */
            text-align: center;
        }
        .bubble::after {
            content: ''; position: absolute; bottom: -13px; left: 50%;
            transform: translateX(-50%); width: 0; height: 0;
            border-left: 10px solid transparent; border-right: 10px solid transparent;
            border-top: 13px solid black;
        }
        .bubble::before {
            content: ''; position: absolute; bottom: -8px; left: 50%;
            transform: translateX(-50%); width: 0; height: 0;
            border-left: 7px solid transparent; border-right: 7px solid transparent;
            border-top: 7px solid white;
        }

        #sidebar { transition: transform 0.4s cubic-bezier(0.7, 0, 0.2, 1); z-index: 120; }
        .sidebar-hidden { transform: translateX(-110%); }
        .sidebar-visible { transform: translateX(0); }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 115; backdrop-filter: blur(4px); }

        header { height: 60px; background: white; border-bottom: 3px solid black; display: flex; align-items: center; padding: 0 1rem; justify-content: space-between; flex-shrink: 0; }
        main { flex-grow: 1; overflow-y: auto; padding: 1rem; padding-bottom: 100px; }

        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; right: 0; height: 75px; 
            background: white; border-top: 6px solid black; 
            display: flex; align-items: center; z-index: 50; 
            padding-bottom: env(safe-area-inset-bottom);
            box-shadow: -6px 0px 0px black;
        }
        .nav-item { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-weight: 900; text-transform: uppercase; font-size: 0.65rem; flex: 1; height: 100%; 
            color: #000; text-decoration: none; position: relative; border-right: 3px solid black;
        }
        .nav-item:last-child { border-right: none; }
        .nav-item.active { background: var(--accent-color); box-shadow: inset 3px 3px 0px black; }
        .nav-icon { width: 28px; height: 28px; margin-bottom: 2px; display: flex; align-items: center; justify-content: center; }
        .nav-divider { width: 6px; height: 45px; background: black; box-shadow: 3px 0px 0px black; }

        /* NAVBAR TOP LINE - GARIS YANG DIJADIIN KURSI */
        .navbar-top-line {
            position: absolute; top: -3px; left: 0; right: 0; height: 6px;
            background: black; z-index: 55; box-shadow: 0px 3px 0px rgba(0,0,0,0.5);
        }

        .main-card { background: white; border: 3px solid black; box-shadow: 6px 6px 0px black; margin-bottom: 1.5rem; cursor: pointer; }
        .photo-frame { width: 100%; height: 200px; border-bottom: 3px solid black; overflow: hidden; position: relative; background-color: #000; }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; object-position: 50% 20%; display: block; }
        .online-badge { position: absolute; top: 10px; right: 10px; background: #00FF00; border: 2px solid black; padding: 2px 8px; font-weight: 900; font-size: 0.6rem; box-shadow: 2px 2px 0px black; }
        .next-update-card { border: 3px dashed #888; padding: 1.5rem; text-align: center; font-weight: 900; font-style: italic; color: #888; background: rgba(255,255,255,0.5); box-shadow: 4px 4px 0px black; margin-bottom: 1rem; }
        .btn-arrow { width: 35px; height: 35px; background: var(--accent-color); border: 3px solid black; display: flex; align-items: center; justify-content: center; box-shadow: 3px 3px 0px black; }

        .console-banner { 
            position: relative; min-height: 200px; overflow: visible;
            border-bottom: 6px solid black; box-shadow: 0px 6px 0px black;
        }
        .console-floor {
            position: absolute; bottom: 0; left: 0; right: 0; height: 6px; 
            background: black; z-index: 10; box-shadow: 0px 3px 0px rgba(0,0,0,0.5);
        }
        .console-text {
            position: absolute; bottom: 15px; left: 15px; right: 15px;
            font-size: 11px; font-weight: 900; text-transform: uppercase;
            background: rgba(255,255,255,0.9); padding: 8px 12px;
            border: 3px solid black; box-shadow: 4px 4px 0px black;
        }
    </style>
</head>

    <script>
        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('overlay');
            if (sb.classList.contains('sidebar-hidden')) {
                sb.classList.replace('sidebar-hidden', 'sidebar-visible');
                ov.style.display = 'block';
            } else {
                sb.classList.replace('sidebar-visible', 'sidebar-hidden');
                ov.style.display = 'none';
            }
        }

        function handleNav(url) {
            const main = document.getElementById('main-content');
            main.style.transition = 'all 0.3s ease';
            main.style.opacity = '0';
            main.style.transform = 'translateY(-10px)';
            setTimeout(() => { window.location.href = url; }, 300);
        }

        // --- NEOBRUTALISM DRAMA LOGIC ---
        const dika = document.getElementById('char-dika');
        const dinda = document.getElementById('char-dinda');
        const bDika = document.getElementById('bubble-dika');
        const bDinda = document.getElementById('bubble-dinda');
        const hDika = document.getElementById('head-dika');
        const hDinda = document.getElementById('head-dinda');
        const box = document.getElementById('drama-box');
        const consoleLog = document.getElementById('console-log');

        function say(el, t, d=3000) {
            // FIXED: SEMUA TEKS DI TENGAH & TERBACA
            el.innerText = t.toLowerCase();
            el.style.left = '50%';
            el.style.transform = 'translateX(-50%)';
            el.style.display = 'block';
            el.style.opacity = '0';
            el.style.transform += ' translateY(15px)';
            setTimeout(() => {
                el.style.transition = 'all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                el.style.opacity = '1';
                el.style.transform = el.style.transform.replace(' translateY(15px)', ' translateY(0)');
            }, 100);
            setTimeout(() => {
                el.style.opacity = '0';
                el.style.transform = el.style.transform.replace(' translateY(0)', ' translateY(-15px)');
                setTimeout(() => el.style.display = 'none', 400);
            }, d);
        }

        function setWalk(char, status) {
            const legs = char.querySelectorAll('.mc-leg');
            if(status) { 
                legs[0].classList.add('walking-l'); 
                legs[1].classList.add('walking-r'); 
            } else { 
                legs[0].classList.remove('walking-l', 'walking-r'); 
                legs[1].classList.remove('walking-l', 'walking-r'); 
            }
        }

        function resetArms(char) {
            const arms = char.querySelectorAll('.mc-arm');
            arms.forEach(arm => arm.style.transform = 'rotate(0deg)');
        }

        function resetSit(char) {
            const legs = char.querySelectorAll('.mc-leg');
            legs.forEach(leg => {
                leg.style.transform = 'rotate(0deg)';
                leg.classList.remove('sit-swing-l', 'sit-swing-r');
            });
        }

        // FIXED: STAND UP FUNCTION
        function standUp(char) {
            const legs = char.querySelectorAll('.mc-leg');
            legs[0].style.transform = 'rotate(0deg)';
            legs[1].style.transform = 'rotate(0deg)';
            legs[0].classList.remove('sit-swing-l', 'sit-swing-r');
            legs[1].classList.remove('sit-swing-l', 'sit-swing-r');
            char.style.transform = 'translateY(0px)';
        }

        // FIXED: SIT DOWN FUNCTION - INSTAN DI GARIS
        function sitDown(char, headRotate = '0deg') {
            char.style.transition = 'all 0.8s ease-out';
            const legs = char.querySelectorAll('.mc-leg');
            legs[0].style.transform = 'rotate(35deg)';
            legs[1].style.transform = 'rotate(55deg)';
            legs[0].classList.add('sit-swing-l');
            legs[1].classList.add('sit-swing-r');
            hDika.style.transform = headRotate;
            setTimeout(() => {
                char.style.transform = 'translateY(28px)';
            }, 100);
        }

        async function startDrama() {
            try {
                // Get stable positions
                const boxRect = box.getBoundingClientRect();
                const consoleFloorRect = box.querySelector('.console-floor').getBoundingClientRect();
                const navbarLineRect = document.querySelector('.navbar-top-line').getBoundingClientRect();
                const navChatRect = document.getElementById('nav-chat').getBoundingClientRect();
                const navFiturRect = document.getElementById('nav-fitur').getBoundingClientRect();
                
                // Convert to document coordinates
                const floorY = consoleFloorRect.bottom + window.scrollY;
                const navbarY = navbarLineRect.top + window.scrollY;
                const boxRight = boxRect.right + window.scrollX;
                
                // RESET SEMUA
                dika.style.transition = dinda.style.transition = "none";
                dika.style.opacity = dinda.style.opacity = "1";
                
                // POSISI AWAL DI KIRI & KANAN CONSOLE FLOOR
                dika.style.left = "25px"; 
                dika.style.top = (floorY - 80) + "px";
                dinda.style.left = (boxRect.width - 60) + "px"; 
                dinda.style.top = (floorY - 80) + "px";
                
                hDika.style.transform = hDinda.style.transform = "rotateY(0deg)";
                dika.style.transform = dinda.style.transform = "rotate(0deg) translateY(0)";
                resetArms(dika); 
                resetArms(dinda); 
                resetSit(dika); 
                resetSit(dinda);
                
                dika.classList.remove('sad-bounce'); 
                dinda.classList.remove('sad-bounce');
                hDika.classList.remove('head-shake'); 
                hDinda.classList.remove('head-shake');
                
                consoleLog.textContent = "sistem siap digunakan oleh user...";
                await new Promise(r => setTimeout(r, 1500));

                // === BERANTEM DI CONSOLE ===
                say(bDika, "dinda pagi~", 2500);
                document.getElementById('arm-dika-r').style.transform = "rotate(25deg)";
                await new Promise(r => setTimeout(r, 2800));
                
                say(bDinda, "pagi juga...", 2500);
                document.getElementById('arm-dinda-r').style.transform = "rotate(-25deg)";
                await new Promise(r => setTimeout(r, 2800));
                resetArms(dika); 
                resetArms(dinda);

                say(bDinda, "eh dika kemarin katanya mau chat", 3500);
                await new Promise(r => setTimeout(r, 3800));
                
                say(bDika, "eh iya sorry main game bentar...", 3000);
                hDika.classList.add('head-shake');
                await new Promise(r => setTimeout(r, 3300));
                hDika.classList.remove('head-shake');

                say(bDinda, "MAIN GAME?! bohong!", 2800);
                hDinda.style.transform = "rotateY(180deg)";
                document.getElementById('arm-dinda-r').style.transform = "rotate(50deg)";
                await new Promise(r => setTimeout(r, 3100));
                resetArms(dinda);

                // DIKA NYUSUL
                say(bDika, "dinda jangan marah dong...", 3500);
                dika.style.transition = "left 6s linear";
                setWalk(dika, true);
                dika.style.left = (boxRect.width - 115) + "px";
                await new Promise(r => setTimeout(r, 6000));
                setWalk(dika, false);

                say(bDika, "aku janji ga gitu lagi...", 3000);
                await new Promise(r => setTimeout(r, 3300));

                // DINDA TOLAK
                say(bDinda, "udah! pergi sana!", 2500);
                document.getElementById('arm-dinda-l').style.transform = "rotate(-130deg)";
                dika.style.transition = "all 1s ease-out";
                dika.style.left = (boxRect.width - 165) + "px";
                dika.style.transform = "rotate(-20deg)";
                await new Promise(r => setTimeout(r, 1200));
                resetArms(dinda); 
                dika.style.transform = "rotate(0deg)";

                // DIKA SEDIH KE PINGGIR
                dika.classList.add('sad-bounce');
                say(bDika, "ya udah... aku pergi deh...", 3500);
                await new Promise(r => setTimeout(r, 3800));
                dika.classList.remove('sad-bounce');
                
                dika.style.transition = "left 7s linear";
                setWalk(dika, true); 
                hDika.style.transform = "rotateY(180deg)";
                dika.style.left = "20px";
                await new Promise(r => setTimeout(r, 7000));
                setWalk(dika, false);

                // === DIKA TURUN KE GARIS NAVBAR CHAT ===
                consoleLog.textContent = "dika pindah ke chat...";
                dika.style.transition = "all 4s cubic-bezier(0.25, 0.1, 0.25, 1)";
                const chatCenter = navChatRect.left + (navChatRect.width / 2) - 18 + window.scrollX;
                dika.style.left = chatCenter + "px";
                dika.style.top = (navbarY - 80) + "px";
                await new Promise(r => setTimeout(r, 4200));

                // FIXED: DIKA DUDUK INSTAN DI GARIS CHAT
                sitDown(dika, 'rotateY(0deg)');

                const laguSedih = ["ingin rasanya", "aku menangis", "merindukan kamu"];
                dika.classList.add('sad-bounce');
                for(let lirik of laguSedih) { 
                    say(bDika, lirik, 2800); 
                    await new Promise(r => setTimeout(r, 3100)); 
                }
                dika.classList.remove('sad-bounce');

                // === DINDA KASIHAN & NYUSUL ===
                consoleLog.textContent = "dinda mulai kasihan...";
                say(bDinda, "kasian sih dika...", 3500);
                hDinda.classList.add('head-shake');
                await new Promise(r => setTimeout(r, 3800));
                hDinda.classList.remove('head-shake');

                dinda.style.transition = "left 8s linear";
                setWalk(dinda, true); 
                hDinda.style.transform = "rotateY(180deg)";
                dinda.style.left = "35px";
                await new Promise(r => setTimeout(r, 8000));
                setWalk(dinda, false);

                // DINDA TURUN KE GARIS NAVBAR FITUR
                dinda.style.transition = "all 4s cubic-bezier(0.25, 0.1, 0.25, 1)";
                const fiturCenter = navFiturRect.left + (navFiturRect.width / 2) - 18 + window.scrollX;
                dinda.style.left = fiturCenter + "px";
                dinda.style.top = (navbarY - 80) + "px";
                await new Promise(r => setTimeout(r, 4200));

                // FIXED: DINDA DUDUK INSTAN DI GARIS FITUR
                sitDown(dinda, 'rotateY(180deg)');

                // FIXED: DRAMA LEBIH NATURAL
                consoleLog.textContent = "mereka mulai berdamai...";
                say(bDinda, "ya udah deh dika...", 3000);
                await new Promise(r => setTimeout(r, 3300));
                
                say(bDika, "kamu ga marah lagi?", 3000);
                document.getElementById('arm-dika-r').style.transform = "rotate(30deg)";
                await new Promise(r => setTimeout(r, 3300));
                resetArms(dika);

                say(bDinda, "ga lah... ayo sini", 3000);
                document.getElementById('arm-dinda-l').style.transform = "rotate(-30deg)";
                await new Promise(r => setTimeout(r, 3300));
                resetArms(dinda);

                // FIXED: BERDIRI DULU SEBELUM JALAN PULANG
                consoleLog.textContent = "ayo pulang bareng...";
                standUp(dika);
                standUp(dinda);
                await new Promise(r => setTimeout(r, 800));

                // PELUK DI TENGAH & GANDENGAN TANGAN
                dika.style.transition = dinda.style.transition = "left 2.5s ease-in-out";
                const meetX = (chatCenter + fiturCenter) / 2 - 18;
                dika.style.left = meetX + "px";
                dinda.style.left = (meetX + 35) + "px";
                say(bDinda, "ayo pulang yuk...", 3500);
                document.getElementById('arm-dika-r').style.transform = "rotate(-25deg)";
                document.getElementById('arm-dinda-l').style.transform = "rotate(25deg)";
                await new Promise(r => setTimeout(r, 4000));

                // GANDENGAN TANGAN PULANG - FIXED SMOOTH
                dika.style.transition = dinda.style.transition = "left 8s linear";
                setWalk(dika, true); 
                setWalk(dinda, true);
                hDika.style.transform = hDinda.style.transform = "rotateY(0deg)";
                dika.style.left = "125%"; 
                dinda.style.left = "135%";
                
                await new Promise(r => setTimeout(r, 8500));
                consoleLog.textContent = "loop dimulai lagi...";
                
                // Small delay before restart
                await new Promise(r => setTimeout(r, 1000));
                startDrama();
                
            } catch(error) {
                console.error('Drama error:', error);
                setTimeout(startDrama, 2000);
            }
        }

        // Start drama when page loads
        window.addEventListener('load', () => {
            setTimeout(startDrama, 500);
        });
    </script>
</body>
</html>
