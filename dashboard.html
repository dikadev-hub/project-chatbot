<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dika Dev Dashboard - Neobrutalism</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f0f0;
            --accent-yellow: #FFDE00;
            --accent-blue: #38bdf8;
            --accent-pink: #f472b6;
            --accent-green: #4ade80;
            --border-black: #000000;
        }

        body {
            font-family: 'Public Sans', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(var(--border-black) 1px, transparent 0);
            background-size: 24px 24px;
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            overflow: hidden; 
            height: 100vh;
            color: #000;
            display: flex;
            flex-direction: column;
        }

        /* Shadow Utilities */
        .neo-shadow-sm { box-shadow: 3px 3px 0px 0px #000; }
        .neo-shadow-md { box-shadow: 5px 5px 0px 0px #000; }
        .neo-shadow-lg { box-shadow: 8px 8px 0px 0px #000; }
        
        .neo-border { border: 3px solid #000; }
        .neo-button:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px 0px #000; }

        /* Sidebar Drawer */
        #sidebar {
            transition: transform 0.4s cubic-bezier(0.7, 0, 0.2, 1);
            z-index: 100;
            background-image: radial-gradient(#000 1px, transparent 0);
            background-size: 15px 15px;
        }
        .sidebar-hidden { transform: translateX(-110%); }
        .sidebar-visible { transform: translateX(0); }

        #overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 90;
            backdrop-filter: blur(2px);
        }

        header {
            height: 70px;
            background: white;
            border-bottom: 4px solid black;
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            justify-content: space-between;
            flex-shrink: 0;
            z-index: 60;
        }

        main {
            flex-grow: 1;
            overflow-y: auto;
            padding: 1.5rem;
            padding-bottom: 120px;
        }

        /* Bottom Navbar */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 500px;
            height: 70px;
            background: white;
            border: 4px solid black;
            display: flex;
            align-items: center;
            z-index: 80;
            border-radius: 0;
            box-shadow: 8px 8px 0px #000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 0.7rem;
            flex: 1;
            height: 100%;
            color: #000;
            text-decoration: none;
            transition: background 0.2s;
        }

        .nav-item.active { background: var(--accent-yellow); }
        .nav-item:not(.active):hover { background: #eee; }

        .nav-icon { width: 28px; height: 28px; margin-bottom: 2px; }
        .nav-divider { width: 4px; height: 100%; background: black; }

        /* Banner Console */
        .console-box {
            background: var(--accent-yellow);
            border: 4px solid black;
            padding: 1rem;
            margin-bottom: 1.5rem;
            box-shadow: 6px 6px 0px black;
        }

        /* Card System */
        .card-container {
            background: white;
            border: 4px solid black;
            box-shadow: 8px 8px 0px black;
            margin-bottom: 2rem;
            overflow: hidden;
            transition: transform 0.2s;
        }
        .card-container:active { transform: translate(4px, 4px); box-shadow: 4px 4px 0px black; }

        .photo-frame {
            width: 100%;
            height: 220px; 
            border-bottom: 4px solid black;
            position: relative;
            background-color: var(--accent-blue);
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
            filter: contrast(1.1);
        }

        .tag-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: var(--accent-green);
            border: 3px solid black;
            padding: 4px 10px;
            font-weight: 900;
            font-size: 0.7rem;
            box-shadow: 3px 3px 0px black;
            text-transform: uppercase;
        }

        .next-update-card {
            border: 4px dashed #000;
            padding: 2rem;
            text-align: center;
            font-weight: 900;
            font-size: 1.2rem;
            text-transform: uppercase;
            color: #000;
            background: white;
            box-shadow: 6px 6px 0px #000;
            margin-bottom: 1.5rem;
        }

        .action-btn {
            background: var(--accent-yellow);
            border: 3px solid black;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 3px 3px 0px black;
        }

        /* Custom Scrollbar */
        main::-webkit-scrollbar { width: 10px; }
        main::-webkit-scrollbar-track { background: transparent; }
        main::-webkit-scrollbar-thumb { background: #000; border: 2px solid var(--bg-color); }
    </style>
</head>
<body>

    <div id="overlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed top-0 left-0 h-full w-72 bg-white border-r-8 border-black p-8 sidebar-hidden flex flex-col">
        <div class="mb-10 bg-black text-white p-4 neo-shadow-md">
            <h1 class="text-3xl font-black italic uppercase tracking-tighter">DIKA MENU</h1>
        </div>
        <nav class="space-y-6">
            <button class="w-full p-4 neo-border neo-button bg-[#38bdf8] font-black text-left uppercase text-lg neo-shadow-md">PROFILE</button>
            <button onclick="handleNav('setting/setting.html')" class="w-full p-4 neo-border neo-button bg-[#f472b6] font-black text-left uppercase text-lg neo-shadow-md">SETTING</button>
            <button class="w-full p-4 neo-border neo-button bg-[#4ade80] font-black text-left uppercase text-lg neo-shadow-md">PROJECTS</button>
        </nav>
        <div class="mt-auto p-4 bg-white border-4 border-black neo-shadow-sm text-center font-black text-sm uppercase">
            VER 2.5 // DIKA DEV
        </div>
    </aside>

    <header>
        <button onclick="toggleSidebar()" class="w-12 h-12 border-4 border-black flex items-center justify-center bg-white shadow-[4px_4px_0_0_#000] active:translate-x-[2px] active:translate-y-[2px] active:shadow-none transition-all">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="bg-black px-4 py-1">
             <div class="font-black text-sm italic uppercase text-white tracking-widest">DikaDev / Console</div>
        </div>
        <div class="w-12 h-12 bg-black flex items-center justify-center neo-shadow-sm border-2 border-white">
            <span class="text-white font-black">D</span>
        </div>
    </header>

    <main id="main-content">
        <!-- Banner -->
        <div class="console-box">
            <div class="flex items-center gap-2 mb-1">
                <div class="w-3 h-3 bg-black rounded-full"></div>
                <h2 class="text-2xl font-black italic uppercase leading-none">STATUS: READY</h2>
            </div>
            <p class="text-[11px] font-bold uppercase tracking-wider bg-white/30 inline-block px-1">Sistem dashboard diaktifkan oleh developer</p>
        </div>

        <!-- Bot Card -->
        <div class="card-container" onclick="handleNav('bot/rain.html')">
            <div class="photo-frame">
                <div class="tag-badge">WHATSAPP BOT</div>
                <img src="https://i.ibb.co.com/zVykFCrG/wkcfhd.jpg" alt="Rain Bot">
            </div>
            <div class="p-5 flex justify-between items-center bg-white">
                <div>
                    <h3 class="text-2xl font-black italic uppercase leading-none mb-1">RAIN BOT V.1</h3>
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                        <p class="text-[10px] font-black text-gray-500 uppercase">Status: Online & Running</p>
                    </div>
                </div>
                <div class="action-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </div>
            </div>
        </div>

        <!-- Next Updates -->
        <div class="next-update-card" style="background-color: var(--accent-pink);">
            Coming Soon
        </div>
        <div class="next-update-card" style="background-color: var(--accent-blue);">
            Development
        </div>
    </main>

    <!-- Floating Nav -->
    <nav class="bottom-nav">
        <a href="#" class="nav-item active">
            <div class="nav-icon flex items-center justify-center">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </div>
            <span>CHAT</span>
        </a>
        <div class="nav-divider"></div>
        <a href="javascript:void(0)" onclick="handleNav('logic/fitur.html')" class="nav-item">
            <div class="nav-icon flex items-center justify-center">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            </div>
            <span>FITUR</span>
        </a>
        <div class="nav-divider"></div>
        <a href="javascript:void(0)" onclick="handleNav('setting/setting.html')" class="nav-item">
            <div class="nav-icon flex items-center justify-center">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </div>
            <span>SET</span>
        </a>
    </nav>

    <script>
        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('overlay');
            if (sb.classList.contains('sidebar-hidden')) {
                sb.classList.replace('sidebar-hidden', 'sidebar-visible');
                ov.style.display = 'block';
            } else {
                sb.classList.replace('sidebar-visible', 'sidebar-hidden');
                ov.style.display = 'none';
            }
        }

        function handleNav(url) {
            const main = document.getElementById('main-content');
            main.style.transition = 'all 0.3s cubic-bezier(0.17, 0.67, 0.83, 0.67)';
            main.style.opacity = '0';
            main.style.transform = 'scale(0.9) translateY(20px)';
            
            setTimeout(() => {
                window.location.href = url;
            }, 300);
        }
    </script>
</body>
</html>
