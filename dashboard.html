<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dika Dev Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #E2E2E2;
            --accent-color: #FFDE00;
            --border-color: #000000;
            --skin: #FFDBAC;
            --hair-dika: #5D3A1A;
            --hair-dinda: #FF71CD;
            --shirt-dika: #00A896;
            --shirt-dinda: #FF4E88;
            --pants: #333;
        }

        body {
            font-family: 'Public Sans', sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 0; overflow: hidden; 
            height: 100vh; color: #000; display: flex; flex-direction: column;
        }

        .neo-border { border: 3px solid #000; box-shadow: 5px 5px 0px 0px #000; }

        /* Character Styles */
        .mc-char {
            width: 40px; height: 85px;
            position: absolute;
            z-index: 100;
            pointer-events: none;
            transition: all 0.8s linear;
        }
        .mc-head {
            width: 28px; height: 28px; background: var(--skin);
            border: 2px solid black; position: absolute; top: 0; left: 6px;
            transition: transform 0.5s;
            border-radius: 50% 50% 45% 45%;
        }
        .mc-hair { width: 100%; height: 8px; border-bottom: 2px solid black; border-radius: 50% 50% 0 0; }
        .eye-row { display: flex; justify-content: space-between; padding: 6px 4px 0; }
        .mc-eye { width: 5px; height: 3px; background: white; border: 1px solid black; position: relative; border-radius: 2px; }
        .mc-eye::after { content: ''; position: absolute; width: 2px; height: 2px; background: #333; right: 0; bottom: 0; border-radius: 50%; }
        .mc-body { width: 28px; height: 30px; border: 2px solid black; position: absolute; top: 26px; left: 6px; border-radius: 0 0 15px 15px; }
        .mc-arm { width: 9px; height: 26px; background: var(--skin); border: 2px solid black; position: absolute; top: 28px; transform-origin: top center; transition: all 0.5s; border-radius: 5px; }
        .mc-leg { width: 11px; height: 28px; background: var(--pants); border: 2px solid black; position: absolute; top: 54px; transform-origin: top center; border-radius: 5px 5px 0 0; }
        
        .dika .mc-hair { background: var(--hair-dika); }
        .dika .mc-body { background: var(--shirt-dika); }
        .dinda .mc-hair { background: var(--hair-dinda); }
        .dinda .mc-body { background: var(--shirt-dinda); }

        /* Animations */
        @keyframes walk { 0%, 100% { transform: rotate(-20deg); } 50% { transform: rotate(20deg); } }
        @keyframes walk-alt { 0%, 100% { transform: rotate(20deg); } 50% { transform: rotate(-20deg); } }
        .walking-l { animation: walk 0.4s infinite; }
        .walking-r { animation: walk-alt 0.4s infinite; }
        @keyframes sitSwing { 0%, 100% { transform: rotate(25deg); } 50% { transform: rotate(55deg); } }
        .sit-swing-l { animation: sitSwing 1s infinite ease-in-out; }
        .sit-swing-r { animation: sitSwing 1s infinite ease-in-out 0.2s; }
        @keyframes headShake { 0%, 100% { transform: rotateY(0deg) translateX(0); } 25% { transform: rotateY(-5deg) translateX(-1px); } 75% { transform: rotateY(5deg) translateX(1px); } }
        @keyframes armWave { 0%, 100% { transform: rotate(-10deg); } 50% { transform: rotate(30deg); } }
        @keyframes sadBounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }

        .head-shake { animation: headShake 0.6s ease-in-out; }
        .arm-wave { animation: armWave 1s infinite; }
        .sad-bounce { animation: sadBounce 0.5s infinite; }

        .bubble {
            position: absolute; background: white; border: 2px solid black;
            padding: 4px 10px; font-size: 10px; font-weight: 700;
            top: -45px; left: 50%; transform: translateX(-50%);
            display: none; white-space: nowrap; z-index: 110;
            box-shadow: 3px 3px 0px black; border-radius: 4px;
        }
        .bubble::after {
            content: ''; position: absolute; bottom: -10px; left: 50%;
            transform: translateX(-50%); width: 0; height: 0;
            border-left: 8px solid transparent; border-right: 8px solid transparent;
            border-top: 10px solid black;
        }
        .bubble::before {
            content: ''; position: absolute; bottom: -6px; left: 50%;
            transform: translateX(-50%); width: 0; height: 0;
            border-left: 6px solid transparent; border-right: 6px solid transparent;
            border-top: 6px solid white;
        }

        #sidebar { transition: transform 0.4s cubic-bezier(0.7, 0, 0.2, 1); z-index: 120; }
        .sidebar-hidden { transform: translateX(-110%); }
        .sidebar-visible { transform: translateX(0); }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 115; backdrop-filter: blur(4px); }

        header { height: 60px; background: white; border-bottom: 3px solid black; display: flex; align-items: center; padding: 0 1rem; justify-content: space-between; flex-shrink: 0; }
        main { flex-grow: 1; overflow-y: auto; padding: 1rem; padding-bottom: 100px; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: white; border-top: 4px solid black; display: flex; align-items: center; z-index: 50; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 900; text-transform: uppercase; font-size: 0.65rem; flex: 1; height: 100%; color: #000; text-decoration: none; position: relative; }
        .nav-item.active { background: var(--accent-color); }
        .nav-icon { width: 28px; height: 28px; margin-bottom: 2px; display: flex; align-items: center; justify-content: center; }
        .nav-divider { width: 3px; height: 35px; background: black; }

        .main-card { background: white; border: 3px solid black; box-shadow: 6px 6px 0px black; margin-bottom: 1.5rem; cursor: pointer; }
        .photo-frame { width: 100%; height: 200px; border-bottom: 3px solid black; overflow: hidden; position: relative; background-color: #000; }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; object-position: 50% 20%; display: block; }
        .online-badge { position: absolute; top: 10px; right: 10px; background: #00FF00; border: 2px solid black; padding: 2px 8px; font-weight: 900; font-size: 0.6rem; box-shadow: 2px 2px 0px black; }
        .next-update-card { border: 3px dashed #888; padding: 1.5rem; text-align: center; font-weight: 900; font-style: italic; color: #888; background: rgba(255,255,255,0.5); box-shadow: 4px 4px 0px black; margin-bottom: 1rem; }
        .btn-arrow { width: 35px; height: 35px; background: var(--accent-color); border: 2px solid black; display: flex; align-items: center; justify-content: center; box-shadow: 2px 2px 0px black; }

        .console-banner { 
            position: relative; min-height: 160px; overflow: visible;
            border-bottom: 4px solid black;
        }
        .console-line {
            position: absolute; bottom: 0; left: 0; right: 0; height: 4px; 
            background: black; z-index: 10;
        }
    </style>
</head>
<body>

    <div id="overlay" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-white border-r-4 border-black p-6 sidebar-hidden flex flex-col">
        <h1 class="text-2xl font-black italic mb-8 underline uppercase">Dika Menu</h1>
        <nav class="space-y-4">
            <button class="w-full p-3 neo-border bg-[#00E6FF] font-black text-left uppercase">PROFILE</button>
            <button onclick="handleNav('setting/setting.html')" class="w-full p-3 neo-border bg-[#FF71CD] font-black text-left uppercase">SETTING</button>
        </nav>
        <div class="mt-auto p-3 bg-black text-white text-center font-black text-xs uppercase">DIKA DEV PROJECT</div>
    </aside>

    <header>
        <button onclick="toggleSidebar()" class="w-10 h-10 border-2 border-black flex items-center justify-center bg-white shadow-[2px_2px_0_0_#000]">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="font-black text-base italic uppercase tracking-tighter">DASHBOARD / DIKA DEV</div>
        <div class="w-10"></div>
    </header>

    <main id="main-content">
        <div class="bg-[#FFDE00] border-4 border-black p-4 mb-6 shadow-[5px_5px_0_0_#000] console-banner" id="drama-box">
            <h2 class="text-xl font-black italic uppercase leading-tight">CONSOLE LOG</h2>
            <p class="text-[10px] font-bold lowercase mb-4">sistem siap digunakan oleh user.</p>
            <div class="console-line"></div>

            <!-- CHARACTERS -->
            <div id="char-dinda" class="mc-char dinda">
                <div class="bubble" id="bubble-dinda"></div>
                <div class="mc-head" id="head-dinda"><div class="mc-hair"></div><div class="eye-row"><div class="mc-eye"></div><div class="mc-eye"></div></div></div>
                <div class="mc-body"></div>
                <div class="mc-arm" style="left:-4px" id="arm-dinda-l"></div>
                <div class="mc-arm" style="right:-4px" id="arm-dinda-r"></div>
                <div class="mc-leg" style="left:2px" id="leg-dinda-l"></div>
                <div class="mc-leg" style="right:2px" id="leg-dinda-r"></div>
            </div>
            <div id="char-dika" class="mc-char dika">
                <div class="bubble" id="bubble-dika"></div>
                <div id="head-dika" class="mc-head"><div class="mc-hair"></div><div class="eye-row"><div class="mc-eye"></div><div class="mc-eye"></div></div></div>
                <div class="mc-body"></div>
                <div class="mc-arm" style="left:-4px" id="arm-dika-l"></div>
                <div class="mc-arm" style="right:-4px" id="arm-dika-r"></div>
                <div class="mc-leg" style="left:2px" id="leg-dika-l"></div>
                <div class="mc-leg" style="right:2px" id="leg-dika-r"></div>
            </div>
        </div>

        <div class="main-card" onclick="handleNav('bot/rain.html')">
            <div class="photo-frame">
                <img src="https://i.ibb.co.com/zVykFCrG/wkcfhd.jpg" alt="Rain Bot">
                <div class="online-badge">ONLINE</div>
            </div>
            <div class="p-4 flex justify-between items-center bg-white">
                <div>
                    <h3 class="text-xl font-black italic">RAIN BOT V1</h3>
                    <p class="text-[10px] font-bold text-gray-500 uppercase">SENTUH UNTUK MELANJUTKAN</p>
                </div>
                <div class="btn-arrow">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </div>
            </div>
        </div>

        <div class="next-update-card uppercase">Next Update</div>
        <div class="next-update-card uppercase">Next Update</div>
    </main>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active" id="nav-chat">
            <div class="nav-icon"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
            <span>CHAT</span>
        </a>
        <div class="nav-divider"></div>
        <a href="javascript:void(0)" onclick="handleNav('logic/fitur.html')" class="nav-item" id="nav-fitur">
            <div class="nav-icon"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
            <span>FITUR</span>
        </a>
        <div class="nav-divider"></div>
        <a href="javascript:void(0)" onclick="handleNav('setting/setting.html')" class="nav-item">
            <div class="nav-icon"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></div>
            <span>SETTING</span>
        </a>
    </nav>

    <script>
        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('overlay');
            if (sb.classList.contains('sidebar-hidden')) {
                sb.classList.replace('sidebar-hidden', 'sidebar-visible');
                ov.style.display = 'block';
            } else {
                sb.classList.replace('sidebar-visible', 'sidebar-hidden');
                ov.style.display = 'none';
            }
        }

        function handleNav(url) {
            const main = document.getElementById('main-content');
            main.style.transition = 'all 0.3s ease';
            main.style.opacity = '0';
            main.style.transform = 'translateY(-10px)';
            setTimeout(() => { window.location.href = url; }, 300);
        }

        // --- DRAMA LOGIC ---
        const dika = document.getElementById('char-dika');
        const dinda = document.getElementById('char-dinda');
        const bDika = document.getElementById('bubble-dika');
        const bDinda = document.getElementById('bubble-dinda');
        const hDika = document.getElementById('head-dika');
        const hDinda = document.getElementById('head-dinda');
        const box = document.getElementById('drama-box');

        function say(el, t, d=2500) {
            el.innerText = t.toLowerCase(); 
            el.style.display = 'block';
            el.style.opacity = '0';
            el.style.transform = 'translateY(10px)';
            setTimeout(() => {
                el.style.transition = 'all 0.3s ease';
                el.style.opacity = '1';
                el.style.transform = 'translateY(0)';
            }, 100);
            setTimeout(() => {
                el.style.transition = 'all 0.3s ease';
                el.style.opacity = '0';
                el.style.transform = 'translateY(-10px)';
                setTimeout(() => el.style.display = 'none', 300);
            }, d);
        }

        function setWalk(char, status) {
            const legs = char.querySelectorAll('.mc-leg');
            if(status) { 
                legs[0].classList.add('walking-l'); 
                legs[1].classList.add('walking-r'); 
            } else { 
                legs[0].classList.remove('walking-l'); 
                legs[1].classList.remove('walking-r'); 
            }
        }

        function resetArms(char) {
            const arms = char.querySelectorAll('.mc-arm');
            arms[0].style.transform = 'rotate(0deg)';
            arms[1].style.transform = 'rotate(0deg)';
        }

        async function startDrama() {
            const boxRect = box.getBoundingClientRect();
            const consoleLine = box.querySelector('.console-line').getBoundingClientRect();
            const footerTop = document.querySelector('.bottom-nav').getBoundingClientRect().top;
            
            // Reset semua posisi dan animasi
            dika.style.transition = dinda.style.transition = "none";
            const floorY = consoleLine.top + window.scrollY; 
            
            // POSISI AWAL DI ATAS GARIS HITAM CONSOLE
            dika.style.left = "15px"; 
            dika.style.top = (floorY - 85) + "px";
            dinda.style.left = (boxRect.width - 55) + "px"; 
            dinda.style.top = (floorY - 85) + "px";
            
            hDinda.style.transform = hDika.style.transform = "rotateY(0deg)";
            dika.style.opacity = dinda.style.opacity = "1";
            dika.style.transform = dinda.style.transform = "rotate(0deg) translateY(0)";
            resetArms(dika); resetArms(dinda);
            
            // Hapus semua class animasi
            dika.classList.remove('sad-bounce');
            dinda.classList.remove('sad-bounce');
            hDika.classList.remove('head-shake');
            hDinda.classList.remove('head-shake');
            
            await new Promise(r => setTimeout(r, 1000));

            // === SCENE 1: SALAM DAN MULAI NGOBROL ===
            say(bDika, "pagi dinda cantikku~");
            document.getElementById('arm-dika-r').style.transform = "rotate(20deg)";
            await new Promise(r => setTimeout(r, 3000));
            
            say(bDinda, "pagi juga sayangku~");
            document.getElementById('arm-dinda-r').style.transform = "rotate(-20deg)";
            await new Promise(r => setTimeout(r, 3000));
            resetArms(dika); resetArms(dinda);

            // === SCENE 2: DINDA MULAI NGAMBEK ===
            say(bDinda, "eh iya dika, kemarin kamu kemana aja?");
            await new Promise(r => setTimeout(r, 3500));
            
            say(bDika, "eh? kemarin? oh iya aku main game bentar...");
            hDika.classList.add('head-shake');
            await new Promise(r => setTimeout(r, 3000));
            hDika.classList.remove('head-shake');

            say(bDinda, "MAIN GAME?! katanya mau nemenin aku!");
            hDinda.style.transform = "rotateY(180deg)";
            document.getElementById('arm-dinda-r').style.transform = "rotate(45deg)";
            await new Promise(r => setTimeout(r, 3500));
            resetArms(dinda);

            // === SCENE 3: DIKA NYUSUL ===
            say(bDika, "dinda jangan marah dong... aku minta maaf ya...");
            dika.style.transition = "all 5s linear";
            setWalk(dika, true);
            dika.style.left = (boxRect.width - 110) + "px";
            await new Promise(r => setTimeout(r, 5000));
            setWalk(dika, false);
            
            say(bDika, "aku janji besok nemenin seharian kok...");
            await new Promise(r => setTimeout(r, 3500));

            // === SCENE 4: DINDA MASIH NGAMBEK ===
            say(bDinda, "pergi sana! aku ga mau liat muka kamu!");
            document.getElementById('arm-dinda-l').style.transform = "rotate(-120deg)";
            dika.style.transition = "all 0.8s ease-out";
            dika.style.left = (boxRect.width - 160) + "px";
            dika.style.transform = "rotate(-15deg)";
            await new Promise(r => setTimeout(r, 1000));
            
            resetArms(dinda);
            dika.style.transform = "rotate(0deg)";

            // === SCENE 5: DIKA SEDIH & JALAN KE TEPI ===
            dika.classList.add('sad-bounce');
            say(bDika, "ya sudah... aku pergi deh...");
            await new Promise(r => setTimeout(r, 3000));
            dika.classList.remove('sad-bounce');
            
            dika.style.transition = "all 6s linear";
            setWalk(dika, true); 
            hDika.style.transform = "rotateY(180deg)";
            dika.style.left = "10px";
            await new Promise(r => setTimeout(r, 6000));
            setWalk(dika, false);

            // === SCENE 6: DIKA TURUN KE NAVBAR CHAT ===
            dika.style.transition = "all 4s cubic-bezier(0.25, 0.46, 0.45, 0.94)";
            const navChat = document.getElementById('nav-chat').getBoundingClientRect();
            const chatCenterX = navChat.left + (navChat.width / 2) - 20;
            dika.style.left = chatCenterX + "px";
            dika.style.top = (footerTop - 85) + "px"; // Tepat di garis navbar
            await new Promise(r => setTimeout(r, 4200));
            
            // === SCENE 7: DIKA DUDUK DI CHAT BUTTON ===
            dika.style.transition = "all 1s ease-out";
            dika.style.transform = "translateY(25px) scale(0.95)"; // Duduk & kaki nutupin button
            hDika.style.transform = "rotateY(0deg)";
            
            const dikaLegs = dika.querySelectorAll('.mc-leg');
            dikaLegs[0].style.transform = "rotate(35deg)";
            dikaLegs[1].style.transform = "rotate(55deg)";
            dikaLegs[0].classList.add('sit-swing-l');
            dikaLegs[1].classList.add('sit-swing-r');
            
            const sadSong = [
                "ingin rasanya a a a a",
                "aku menangis di sini",
                "merindukan dirimu",
                "yang selalu",
                "ku tunggu tunggu",
                "untuk mendampingi",
                "hidup bersama a a a a"
            ];
            
            dika.classList.add('sad-bounce');
            for(let line of sadSong) { 
                say(bDika, line, 2800); 
                await new Promise(r => setTimeout(r, 3200)); 
            }
            dika.classList.remove('sad-bounce');

            // === SCENE 8: DINDA KASIHAN ===
            say(bDinda, "kasian ya dika... aku keterlaluan nih...");
            hDinda.classList.add('head-shake');
            await new Promise(r => setTimeout(r, 4000));
            hDinda.classList.remove('head-shake');

            // === SCENE 9: DINDA NYUSUL ===
            dinda.style.transition = "all 7s linear";
            setWalk(dinda, true); 
            hDinda.style.transform = "rotateY(180deg)";
            dinda.style.left = "30px";
            await new Promise(r => setTimeout(r, 7000));
            setWalk(dinda, false);

            // === SCENE 10: DINDA TURUN KE NAVBAR FITUR ===
            dinda.style.transition = "all 4s cubic-bezier(0.25, 0.46, 0.45, 0.94)";
            const navFitur = document.getElementById('nav-fitur').getBoundingClientRect();
            const fiturCenterX = navFitur.left + (navFitur.width / 2) - 20;
            dinda.style.left = fiturCenterX + "px";
            dinda.style.top = (footerTop - 85) + "px"; // Tepat di garis navbar
            await new Promise(r => setTimeout(r, 4200));
            
            // === SCENE 11: DINDA DUDUK DI FITUR BUTTON ===
            dinda.style.transition = "all 1s ease-out";
            dinda.style.transform = "translateY(25px) scale(0.95)"; // Duduk & kaki nutupin button
            hDinda.style.transform = "rotateY(180deg)";
            
            const dindaLegs = dinda.querySelectorAll('.mc-leg');
            dindaLegs[0].style.transform = "rotate(35deg)";
            dindaLegs[1].style.transform = "rotate(55deg)";
            dindaLegs[0].classList.add('sit-swing-l');
            dindaLegs[1].classList.add('sit-swing-r');

            // === SCENE 12: RECONCILIATION ===
            say(bDinda, "dika... maafin aku ya sayang...");
            document.getElementById('arm-dinda-l').style.transform = "rotate(-80deg)";
            await new Promise(r => setTimeout(r, 3500));
            
            say(bDika, "aku juga minta maaf dinda... aku sayang kamu");
            document.getElementById('arm-dika-r').style.transform = "rotate(25deg)";
            await new Promise(r => setTimeout(r, 4000));

            // === SCENE 13: PELUKAN ===
            dika.style.transition = dinda.style.transition = "all 2.5s ease-in-out";
            const meetPoint = (chatCenterX + fiturCenterX) / 2 - 20;
            dika.style.left = meetPoint + "px";
            dinda.style.left = (meetPoint + 35) + "px";
            
            document.getElementById('arm-dika-r').style.transform = "rotate(-60deg)";
            document.getElementById('arm-dinda-l').style.transform = "rotate(70deg)";
            
            say(bDinda, "aku juga sayang kamu dika...", 4000);
            await new Promise(r => setTimeout(r, 4500));

            // === SCENE 14: GANDENGAN TANGAN & PULANG ===
            say(bDika, "ayo kita pulang yuk, pegangan tangan...");
            await new Promise(r => setTimeout(r, 3500));
            
            dika.style.transition = dinda.style.transition = "all 8s linear";
            setWalk(dika, true); setWalk(dinda, true);
            hDika.style.transform = hDinda.style.transform = "rotateY(0deg)";
            
            document.getElementById('arm-dika-r').style.transform = "rotate(-20deg)";
            document.getElementById('arm-dinda-l').style.transform = "rotate(20deg)";
            
            dika.style.left = "120%"; 
            dinda.style.left = "130%";
            
            await new Promise(r => setTimeout(r, 8500));
            
            // Reset untuk loop
            startDrama();
        }

        window.onload = startDrama;
    </script>
</body>
</html>
