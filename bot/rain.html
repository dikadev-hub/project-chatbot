<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rain Bot V1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #E2E2E2;
            --yellow: #FFDE00;
            --blue: #00E6FF;
            --border: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Public Sans', sans-serif;
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            height: 55px;
            background: white;
            border-bottom: 3.5px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 12px;
            z-index: 100;
            flex-shrink: 0;
        }

        .btn-back {
            width: 35px;
            height: 35px;
            background: white;
            border: 2.5px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2.5px 2.5px 0px var(--border);
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 20px; /* Jarak antar pesan diperlebar sedikit untuk ruang tombol */
            background-image: radial-gradient(var(--border) 0.8px, transparent 0.8px);
            background-size: 15px 15px;
            scroll-behavior: smooth;
        }

        .msg-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            position: relative;
        }

        .msg-wrapper.bot { align-self: flex-start; }
        .msg-wrapper.user { align-self: flex-end; }

        .msg {
            padding: 10px 12px;
            border: 3px solid var(--border);
            font-weight: 700;
            font-size: 13.5px;
            line-height: 1.4;
            word-wrap: break-word;
            opacity: 0;
            transform: translateY(10px);
            animation: appear 0.25s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes appear {
            to { opacity: 1; transform: translateY(0); }
        }

        .user .msg {
            background: var(--blue);
            box-shadow: 3.5px 3.5px 0px var(--border);
            border-radius: 12px 12px 0 12px;
        }

        .bot .msg {
            background: white;
            box-shadow: -3.5px 3.5px 0px var(--border);
            border-radius: 12px 12px 12px 0;
        }

        .thumb {
            width: 100%;
            border-radius: 4px;
            border: 2.5px solid var(--border);
            margin-bottom: 8px;
            display: block;
        }

        /* FLOATING BUTTON DI BAWAH CHAT */
        .msg-btn {
            margin-top: 10px; /* Jarak spasi dari bubble chat */
            background: var(--yellow);
            border: 3px solid var(--border);
            padding: 8px 12px;
            text-align: center;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 12px;
            cursor: pointer;
            box-shadow: 3.5px 3.5px 0px var(--border);
            width: fit-content;
            align-self: center; /* Tombol berada di tengah bubble */
            transition: all 0.1s;
        }

        .msg-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px var(--border);
        }

        .input-wrapper {
            background: white;
            border-top: 4px solid var(--border);
            padding: 10px 15px;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
            z-index: 100;
            padding-bottom: max(10px, env(safe-area-inset-bottom));
        }

        .neo-input {
            flex: 1;
            border: 3px solid var(--border);
            padding: 10px 15px;
            font-weight: 700;
            outline: none;
            box-shadow: 3px 3px 0px var(--border);
            background: white;
            font-size: 14px;
        }

        .btn-send {
            width: 46px;
            height: 46px;
            background: var(--yellow);
            border: 3px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 3px 3px 0px var(--border);
        }

        .typing-box {
            display: flex;
            gap: 4px;
            padding: 5px 2px;
            align-items: center;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--border);
            border-radius: 50%;
            animation: wave 1.3s infinite ease-in-out;
        }

        .dot:nth-child(2) { animation-delay: -1.1s; }
        .dot:nth-child(3) { animation-delay: -0.9s; }

        @keyframes wave {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }
    </style>
</head>
<body>

    <header>
        <button onclick="window.history.back()" class="btn-back">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="4"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <div class="font-black italic uppercase tracking-tighter text-sm">[ RAIN BOT V1 ]</div>
    </header>

    <div id="chat-container">
        <div class="msg-wrapper bot">
            <div class="msg">Halo! Ada yang bisa Rain bantu? Ketik *#menu* untuk memulai.</div>
        </div>
    </div>

    <div class="input-wrapper">
        <input type="text" id="input-chat" class="neo-input" placeholder="Ketik pesan..." autocomplete="off">
        <button id="send-chat" class="btn-send">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="4"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        </button>
    </div>

    <script src="rain-chat.js"></script>
    <script>
        const container = document.getElementById('chat-container');
        const input = document.getElementById('input-chat');
        const btn = document.getElementById('send-chat');

        function appendMsg(content, isUser) {
            const wrapper = document.createElement('div');
            wrapper.className = isUser ? 'msg-wrapper user' : 'msg-wrapper bot';
            
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg';

            if (!isUser && typeof content === 'object') {
                if (content.image) {
                    const img = document.createElement('img');
                    img.src = content.image;
                    img.className = 'thumb';
                    msgDiv.appendChild(img);
                }
                const p = document.createElement('div');
                p.innerHTML = (content.teks || "").replace(/\n/g, '<br>').replace(/\*(.*?)\*/g, '<b>$1</b>');
                msgDiv.appendChild(p);
                
                wrapper.appendChild(msgDiv);

                if (content.button) {
                    const b = document.createElement('div');
                    b.className = 'msg-btn';
                    b.innerText = content.button;
                    b.onclick = () => kirim(content.button);
                    wrapper.appendChild(b); // Tombol di luar bubble chat (floating)
                }
            } else {
                msgDiv.innerHTML = content.replace(/\n/g, '<br>').replace(/\*(.*?)\*/g, '<b>$1</b>');
                wrapper.appendChild(msgDiv);
            }

            container.appendChild(wrapper);
            container.scrollTop = container.scrollHeight;
        }

        function showTyping() {
            const wrapper = document.createElement('div');
            wrapper.className = 'msg-wrapper bot';
            wrapper.id = 'temp-typing';
            
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg';
            msgDiv.innerHTML = `<div class="typing-box"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
            
            wrapper.appendChild(msgDiv);
            container.appendChild(wrapper);
            container.scrollTop = container.scrollHeight;
            return wrapper;
        }

        async function kirim(pesan) {
            const txt = pesan || input.value.trim();
            if (!txt) return;

            appendMsg(txt, true);
            if (!pesan) input.value = '';

            const t = showTyping();
            
            setTimeout(async () => {
                t.remove();
                const res = await balas(txt);
                appendMsg(res, false);
            }, 1000);
        }

        btn.onclick = () => kirim();
        input.onkeydown = (e) => { if(e.key === 'Enter') kirim(); };
    </script>
</body>
</html>
