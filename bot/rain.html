<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rain Bot V1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #E2E2E2;
            --blue: #00E6FF;
            --yellow: #FFDE00;
            --border: #000000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow: hidden; background-color: var(--bg); font-family: 'Public Sans', sans-serif; }
        body { display: flex; flex-direction: column; }

        header {
            height: 56px; background: white; border-bottom: 4px solid var(--border);
            display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0; z-index: 100;
        }

        .btn-back {
            width: 36px; height: 36px; background: white; border: 3px solid var(--border);
            display: flex; align-items: center; justify-content: center; box-shadow: 2.5px 2.5px 0px var(--border);
        }

        #chat-container {
            flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 20px;
            background-image: radial-gradient(var(--border) 0.7px, transparent 0.7px); background-size: 14px 14px;
        }

        .msg-wrapper { display: flex; flex-direction: column; max-width: 85%; }
        .msg-wrapper.bot { align-self: flex-start; }
        .msg-wrapper.user { align-self: flex-end; }

        .msg {
            padding: 12px 14px; border: 3px solid var(--border); font-weight: 700; font-size: 14px; line-height: 1.5;
            word-wrap: break-word; opacity: 0; transform: translateY(10px); animation: appear 0.2s forwards ease-out;
        }

        @keyframes appear { to { opacity: 1; transform: translateY(0); } }
        .user .msg { background: var(--blue); box-shadow: 4px 4px 0px var(--border); border-radius: 12px 12px 0 12px; }
        .bot .msg { background: white; box-shadow: -4px 4px 0px var(--border); border-radius: 12px 12px 12px 0; width: 100%; }

        .thumb { width: 100%; border-radius: 4px; border: 2.5px solid var(--border); margin-bottom: 10px; display: block; }

        /* Tombol dinamis dikontrol via JS */
        .msg-btn {
            margin-top: 10px; border: 3px solid var(--border); padding: 10px; text-align: center;
            font-weight: 900; text-transform: uppercase; font-size: 12px; cursor: pointer;
            box-shadow: -4px 4px 0px var(--border); width: 100%; transition: 0.1s;
        }
        .msg-btn:active { transform: translate(-2px, 2px); box-shadow: -2px 2px 0px var(--border); }

        .input-wrapper {
            background: white; border-top: 4px solid var(--border); padding: 12px 16px;
            display: flex; gap: 10px; flex-shrink: 0; z-index: 100; padding-bottom: max(12px, env(safe-area-inset-bottom));
        }

        .neo-input {
            flex: 1; border: 3px solid var(--border); padding: 11px 14px; font-weight: 700;
            outline: none; box-shadow: 3px 3px 0px var(--border); background: white; font-size: 14px;
        }

        .btn-send {
            width: 48px; height: 48px; background: var(--yellow); border: 3px solid var(--border);
            display: flex; align-items: center; justify-content: center; box-shadow: 3px 3px 0px var(--border);
        }

        .typing-box { display: flex; gap: 4px; padding: 4px 2px; }
        .dot { width: 6px; height: 6px; background: var(--border); border-radius: 50%; animation: wave 1.3s infinite ease-in-out; }
        @keyframes wave { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
    </style>
</head>
<body>
    <header>
        <button onclick="window.history.back()" class="btn-back">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="4"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <div class="font-black italic uppercase tracking-tighter text-sm">[ RAIN BOT V1 ]</div>
    </header>
    <div id="chat-container">
        <div class="msg-wrapper bot"><div class="msg">Halo! Ada yang bisa Rain bantu? Ketik *#menu* untuk memulai.</div></div>
    </div>
    <div class="input-wrapper">
        <input type="text" id="input-chat" class="neo-input" placeholder="Ketik pesan..." autocomplete="off">
        <button id="send-chat" class="btn-send">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="4"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        </button>
    </div>
    <script src="rain-chat.js"></script>
    <script>
        const container = document.getElementById('chat-container');
        const input = document.getElementById('input-chat');
        const btn = document.getElementById('send-chat');

        function appendMsg(content, isUser) {
            const wrapper = document.createElement('div');
            wrapper.className = isUser ? 'msg-wrapper user' : 'msg-wrapper bot';
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg';

            if (!isUser && typeof content === 'object') {
                if (content.image) {
                    const img = document.createElement('img'); img.src = content.image;
                    img.className = 'thumb'; msgDiv.appendChild(img);
                }
                const p = document.createElement('div');
                p.innerHTML = (content.teks || "").replace(/\n/g, '<br>').replace(/\*(.*?)\*/g, '<b>$1</b>').replace(/\_(.*?)\_/g, '<i>$1</i>');
                msgDiv.appendChild(p);
                wrapper.appendChild(msgDiv);

                if (content.button) {
                    const b = document.createElement('div');
                    b.className = 'msg-btn';
                    b.innerText = content.button;
                    // WARNA & LOGIKA DIKONTROL JS
                    b.style.backgroundColor = content.color || 'white';
                    if(content.color && content.color !== 'white') b.style.color = 'white';
                    
                    b.onclick = () => {
                        if(content.link) window.open(content.link, '_blank');
                        else kirim(content.button);
                    };
                    wrapper.appendChild(b);
                }
            } else {
                msgDiv.innerHTML = content.replace(/\n/g, '<br>').replace(/\*(.*?)\*/g, '<b>$1</b>').replace(/\_(.*?)\_/g, '<i>$1</i>');
                wrapper.appendChild(msgDiv);
            }
            container.appendChild(wrapper);
            setTimeout(() => { container.scrollTop = container.scrollHeight; }, 100);
        }

        async function kirim(pesan) {
            const txt = pesan || input.value.trim();
            if (!txt) return;
            appendMsg(txt, true);
            if (!pesan) input.value = '';
            const t = showTyping();
            setTimeout(async () => {
                t.remove();
                const res = await balas(txt);
                appendMsg(res, false);
            }, 800);
        }

        function showTyping() {
            const wrapper = document.createElement('div'); wrapper.className = 'msg-wrapper bot';
            wrapper.id = 'temp-typing';
            const msgDiv = document.createElement('div'); msgDiv.className = 'msg';
            msgDiv.innerHTML = `<div class="typing-box"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
            wrapper.appendChild(msgDiv); container.appendChild(wrapper);
            container.scrollTop = container.scrollHeight; return wrapper;
        }

        btn.onclick = () => kirim();
        input.onkeydown = (e) => { if(e.key === 'Enter') kirim(); };
    </script>
</body>
</html>
