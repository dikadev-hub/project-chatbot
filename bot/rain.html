<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rain Bot V1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #E2E2E2;
            --yellow: #FFDE00;
            --blue: #00E6FF;
            --border: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Public Sans', sans-serif;
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            height: 60px;
            background: white;
            border-bottom: 4px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 12px;
            z-index: 100;
            flex-shrink: 0;
        }

        .btn-back {
            width: 38px;
            height: 38px;
            background: white;
            border: 3px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 3px 3px 0px var(--border);
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-image: radial-gradient(var(--border) 0.8px, transparent 0.8px);
            background-size: 15px 15px;
            scroll-behavior: smooth;
        }

        .msg {
            max-width: 80%;
            padding: 10px 14px;
            border: 3px solid var(--border);
            font-weight: 700;
            font-size: 14px;
            line-height: 1.4;
            position: relative;
            word-wrap: break-word;
            opacity: 0;
            transform: translateY(10px);
            animation: appear 0.3s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes appear {
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-user {
            align-self: flex-end;
            background: var(--blue);
            box-shadow: 4px 4px 0px var(--border);
            border-radius: 12px 12px 0 12px;
        }

        .msg-bot {
            align-self: flex-start;
            background: white;
            box-shadow: -4px 4px 0px var(--border);
            border-radius: 12px 12px 12px 0;
        }

        .thumb {
            width: 100%;
            border-radius: 4px;
            border: 2px solid var(--border);
            margin-bottom: 8px;
            display: block;
        }

        .input-wrapper {
            background: white;
            border-top: 4px solid var(--border);
            padding: 12px 15px;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
            z-index: 100;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
        }

        .neo-input {
            flex: 1;
            border: 3px solid var(--border);
            padding: 10px 15px;
            font-weight: 700;
            outline: none;
            box-shadow: 3px 3px 0px var(--border);
            background: white;
        }

        .btn-send {
            width: 48px;
            height: 48px;
            background: var(--yellow);
            border: 3px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 3px 3px 0px var(--border);
        }

        /* PERBAIKAN ANIMASI NGETIK */
        .typing-box {
            display: flex;
            gap: 4px;
            padding: 6px 4px;
            align-items: center;
            width: fit-content;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--border);
            border-radius: 50%;
            display: inline-block;
            animation: wave 1.3s infinite ease-in-out;
        }

        .dot:nth-child(2) { animation-delay: -1.1s; }
        .dot:nth-child(3) { animation-delay: -0.9s; }

        @keyframes wave {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }
    </style>
</head>
<body>

    <header>
        <button onclick="window.history.back()" class="btn-back">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="4"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <div class="font-black italic uppercase tracking-tighter">[ RAIN BOT V1 ]</div>
    </header>

    <div id="chat-container">
        <div class="msg msg-bot">Halo! Ada yang bisa Rain bantu? Ketik *#menu* untuk memulai.</div>
    </div>

    <div class="input-wrapper">
        <input type="text" id="input-chat" class="neo-input" placeholder="Ketik pesan..." autocomplete="off">
        <button id="send-chat" class="btn-send">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="4"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        </button>
    </div>

    <script src="rain-chat.js"></script>
    <script>
        const container = document.getElementById('chat-container');
        const input = document.getElementById('input-chat');
        const btn = document.getElementById('send-chat');

        function appendMsg(content, isUser) {
            const div = document.createElement('div');
            div.className = isUser ? 'msg msg-user' : 'msg msg-bot';
            
            if (!isUser && typeof content === 'object') {
                if (content.image) {
                    const img = document.createElement('img');
                    img.src = content.image;
                    img.className = 'thumb';
                    div.appendChild(img);
                }
                const p = document.createElement('div');
                p.innerHTML = content.teks.replace(/\n/g, '<br>').replace(/\*(.*?)\*/g, '<b>$1</b>');
                div.appendChild(p);
            } else {
                div.innerHTML = content.replace(/\n/g, '<br>').replace(/\*(.*?)\*/g, '<b>$1</b>');
            }

            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.id = 'temp-typing';
            div.className = 'msg msg-bot';
            div.innerHTML = `
                <div class="typing-box">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return div;
        }

        async function kirim() {
            const txt = input.value.trim();
            if (!txt) return;

            appendMsg(txt, true);
            input.value = '';

            const t = showTyping();
            
            setTimeout(async () => {
                t.remove();
                const res = await balas(txt);
                appendMsg(res, false);
            }, 1200);
        }

        btn.onclick = kirim;
        input.onkeydown = (e) => { if(e.key === 'Enter') kirim(); };
    </script>
</body>
</html>
