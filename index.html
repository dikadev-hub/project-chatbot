<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="h-screen flex flex-col overflow-hidden bg-[#0a0a0a]">

    <div id="overlay" class="fixed inset-0 bg-black/60 z-40 hidden backdrop-blur-sm"></div>

    <aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-[#121212] z-50 transform -translate-x-full transition-transform duration-300 border-r border-white/10">
        <div class="p-8">
            <h2 class="text-xl font-bold text-white mb-10 tracking-tight">Menu</h2>
            <nav class="flex flex-col gap-6">
                <a href="index.html" class="sidebar-link active">Dashboard</a>
                <a href="#" class="sidebar-link">History</a>
                <a href="#" class="sidebar-link">Profile</a>
                <a href="#" class="sidebar-link text-red-500 mt-10">Logout</a>
            </nav>
        </div>
    </aside>

    <header class="px-8 pt-12 pb-8 flex items-center justify-between">
        <button id="menu-btn" class="p-2 -ml-2 text-white active:scale-90 transition-transform">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <div class="w-8 h-8 rounded-full bg-white/5 border border-white/10"></div>
    </header>

    <main class="flex-1 overflow-y-auto px-8">
        <div class="mb-8">
            <h1 class="text-2xl font-bold text-white tracking-tight">Dashboard</h1>
            <p class="text-xs text-neutral-500 mt-1">Select available terminal</p>
        </div>

        <div class="grid grid-cols-3 gap-3">
            <div class="mode-square active-card" onclick="location.href='rain.html'">
                <div class="icon-box active-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                </div>
                <span class="text-[10px] font-bold text-white uppercase tracking-tighter">Bot V1</span>
            </div>
            <div class="mode-square opacity-20 cursor-not-allowed">
                <div class="icon-box"></div>
                <span class="text-[10px] font-bold text-neutral-600 uppercase">Soon</span>
            </div>
            <div class="mode-square opacity-20 cursor-not-allowed">
                <div class="icon-box"></div>
                <span class="text-[10px] font-bold text-neutral-600 uppercase">Soon</span>
            </div>
        </div>
    </main>

    <nav class="nav-container fixed bottom-0 left-0 right-0 px-8 py-6 pb-10 flex justify-between items-center">
        <button onclick="navTo('index.html')" class="nav-link active">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span class="label">CHAT</span>
        </button>
        <button onclick="navTo('fitur.html')" class="nav-link">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
            <span class="label">FITUR</span>
        </button>
        <button onclick="navTo('setting.html')" class="nav-link">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/></svg>
            <span class="label">SETTING</span>
        </button>
    </nav>

    <script src="main.js"></script>
</body>
</html>
