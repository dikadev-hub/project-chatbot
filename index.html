<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Dika Dev</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Public Sans', sans-serif;
            background-color: #E2E2E2;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
            overflow: hidden;
        }

        .login-card {
            background: white;
            border: 4px solid black;
            box-shadow: 10px 10px 0px 0px #000;
            width: 100%;
            max-width: 350px;
            padding: 2rem;
            position: relative;
        }

        .neo-input {
            width: 100%;
            border: 3px solid black;
            padding: 12px;
            font-weight: 700;
            outline: none;
            box-shadow: 4px 4px 0px black;
            margin-bottom: 1.5rem;
            transition: all 0.2s;
        }

        .neo-input:focus {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px black;
        }

        .login-btn {
            width: 100%;
            background: #FFDE00;
            border: 3px solid black;
            padding: 12px;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 4px 4px 0px black;
            cursor: pointer;
            transition: all 0.2s;
        }

        .login-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px black;
        }

        .error-box {
            display: none;
            background: #FF71CD;
            border: 2px solid black;
            padding: 10px;
            font-weight: 700;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            box-shadow: 3px 3px 0px black;
        }

        .badge {
            position: absolute;
            top: -15px;
            left: 20px;
            background: #00E6FF;
            border: 3px solid black;
            padding: 5px 15px;
            font-weight: 900;
            transform: rotate(-2deg);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="badge">SIGN IN</div>
        
        <h1 class="text-3xl font-black italic mb-6 uppercase tracking-tighter">DIKA DEV PROJECT</h1>

        <div id="error-msg" class="error-box">LOGIN GAGAL! CEK KEMBALI DATA ANDA.</div>

        <form id="login-form">
            <label class="block font-black text-xs mb-1 uppercase">Username</label>
            <input type="text" id="username" class="neo-input" placeholder="Masukan Username" required>

            <label class="block font-black text-xs mb-1 uppercase">Password</label>
            <input type="password" id="password" class="neo-input" placeholder="••••••••" required>

            <button type="submit" class="login-btn">Masuk Sekarang</button>
        </form>

        <p class="mt-6 text-[10px] font-bold text-center text-gray-500 uppercase">© 2026 Dika Dev - All Rights Reserved</p>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        const errorBox = document.getElementById('error-msg');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const usernameInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;

            try {
                // Mengambil data dari user.json
                const response = await fetch('users.json');
                const data = await response.json();
                
                // Mencari user yang cocok
                const user = data.users.find(u => u.username === usernameInput && u.password === passwordInput);

                if (user) {
                    // Jika benar, simpan status login dan arahkan ke dashboard
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('currentUser', user.username);
                    
                    window.location.href = 'dashboard.html';
                } else {
                    // Jika salah, tampilkan pesan error
                    errorBox.style.display = 'block';
                    setTimeout(() => {
                        errorBox.style.display = 'none';
                    }, 3000);
                }
            } catch (error) {
                console.error('Error fetching user data:', error);
                alert('Sistem Error! Pastikan file user.json ada.');
            }
        });
    </script>
</body>
</html>
