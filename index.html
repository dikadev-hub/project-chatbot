<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rain Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="cyber-grid"></div>
    <div class="ambient-glow"></div>

    <nav class="topbar">
        <button class="icon-btn" id="menu-toggle">
            <i class="ph ph-command"></i>
        </button>
        <div class="profile-btn" style="width: 48px; height: 48px; border: 2px solid var(--neon); border-radius: 50%; overflow: hidden; padding: 2px;">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Dika" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
        </div>
    </nav>

    <div class="app-container">
        <header class="header-section">
            <p style="color: var(--neon); font-weight: 700; font-size: 12px; letter-spacing: 2px; margin-bottom: 5px;">SYSTEM ACTIVE</p>
            <h1>Terminal Dashboard</h1>
        </header>

        <main class="dashboard-grid">
            <div class="bot-card" onclick="location.href='dashboard/rain-chat.html'">
                <div class="bot-icon">
                    <i class="ph ph-cpu"></i>
                </div>
                <h2 class="bot-name">RAIN BOT</h2>
                <div class="bot-status">
                    <span class="status-dot"></span>
                    <span>ONLINE V.1</span>
                </div>
            </div>

            <div class="bot-card">
                <div class="bot-icon" style="border-color: var(--text-dim); color: var(--text-dim); box-shadow: none;">
                    <i class="ph ph-lock-key"></i>
                </div>
                <h2 class="bot-name" style="color: var(--text-dim);">PRIVATE</h2>
                <div class="bot-status" style="color: var(--text-dim);">
                    <span class="status-dot" style="background: var(--text-dim); box-shadow: none; animation: none;"></span>
                    <span>LOCKED</span>
                </div>
            </div>
        </main>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <i class="ph ph-house-line"></i>
            <span>CHAT</span>
        </a>
        <a href="#" class="nav-item">
            <i class="ph ph-intersect"></i>
            <span>FITUR</span>
        </a>
        <a href="#" class="nav-item">
            <i class="ph ph-faders-horizontal"></i>
            <span>SETTING</span>
        </a>
    </nav>

    <script>
        document.querySelectorAll('.bot-card, .icon-btn, .nav-item').forEach(el => {
            el.addEventListener('click', () => {
                if (window.navigator.vibrate) window.navigator.vibrate(10);
            });
        });
    </script>
</body>
</html>
