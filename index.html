<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat Bot - DIKA</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="title">CHAT BOT BY DIKA</h1>
                <div class="status-indicator">
                    <div class="status-dot"></div>
                    <span class="status-text">Online</span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main">
            <div class="selection-header">
                <h2 class="section-title">Pilih Bot</h2>
                <p class="section-subtitle">Pilih salah satu bot untuk memulai percakapan</p>
            </div>

            <div class="bot-grid">
                <!-- RAIN BOT - Active -->
                <div class="bot-card active" onclick="selectBot('rain')">
                    <div class="bot-icon">
                        <svg viewBox="0 0 48 48" fill="none">
                            <circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="none"/>
                            <path d="M24 8v8M16 16h8m8 0h-8m-8 8h16m-16 8h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <path d="M28 36l2 2 2-2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <path d="M20 36l-2 2-2-2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <div class="bot-info">
                        <h3 class="bot-name">RAIN BOT</h3>
                        <p class="bot-status">Siap digunakan</p>
                    </div>
                    <div class="bot-action">
                        <svg class="chevron" viewBox="0 0 24 24" fill="none">
                            <path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                </div>

                <!-- Bot 2 - Locked -->
                <div class="bot-card locked">
                    <div class="bot-icon">
                        <svg viewBox="0 0 48 48" fill="none">
                            <rect x="12" y="16" width="24" height="24" rx="4" stroke="currentColor" stroke-width="2"/>
                            <circle cx="24" cy="24" r="8" fill="currentColor"/>
                        </svg>
                    </div>
                    <div class="bot-info">
                        <h3 class="bot-name">STORM BOT</h3>
                        <p class="bot-status">Belum tersedia</p>
                    </div>
                </div>

                <!-- Bot 3 - Locked -->
                <div class="bot-card locked">
                    <div class="bot-icon">
                        <svg viewBox="0 0 48 48" fill="none">
                            <path d="M24 8L12 16v16c0 6 8 10 8 10s8-4 8-10V16l-12-8z" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <div class="bot-info">
                        <h3 class="bot-name">THUNDER BOT</h3>
                        <p class="bot-status">Belum tersedia</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active">
                <svg class="nav-icon" viewBox="0 0 24 24">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                </svg>
                <span>Chat</span>
            </button>
            <button class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24">
                    <rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2" fill="none"/>
                    <rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2" fill="none"/>
                    <rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2" fill="none"/>
                    <rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2" fill="none"/>
                </svg>
                <span>Fitur</span>
            </button>
            <button class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" fill="none"/>
                </svg>
                <span>Profil</span>
            </button>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
