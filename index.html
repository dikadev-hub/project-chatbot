<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard AI</title>
    <link rel="stylesheet" href="style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="cyber-grid"></div>
    <div class="ambient-glow"></div>

    <div class="app-container">
        
        <nav class="topbar">
            <button class="icon-btn">
                <i class="ph ph-list"></i>
            </button>
            <span class="topbar-title">CHAT BOT BY DIKA 🚀</span>
            <button class="profile-btn">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Dika&backgroundColor=151515" alt="Profile">
            </button>
        </nav>

        <header class="header-section">
            <h1>Dashboard</h1>
            <p>Pilih terminal chatbot</p>
        </header>

        <main class="dashboard-grid">
            
            <div class="bot-card">
                <div class="card-header">
                    <div class="bot-icon">
                        <i class="ph ph-robot"></i>
                    </div>
                    <span class="version-badge">v1</span>
                </div>
                <h2 class="bot-name">RAIN BOT</h2>
                <div class="bot-status">
                    <span class="status-dot"></span>
                    <span class="status-text">ONLINE</span>
                </div>
            </div>
            
            </main>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active">
            <i class="ph ph-chat-teardrop-text"></i>
            <span>CHAT</span>
        </a>
        <a href="#" class="nav-item">
            <i class="ph ph-squares-four"></i>
            <span>FITUR</span>
        </a>
        <a href="#" class="nav-item">
            <i class="ph ph-gear"></i>
            <span>SETTING</span>
        </a>
    </nav>
</body>
</html>
